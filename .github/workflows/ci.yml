name: CI/CD Pipeline

on:

  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run AI generated tests?"
        required: true
        default: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Clone Demo Repository
        run: git clone https://github.com/G0dZilLAaA/CICD_DEMO ci-target/CICD_DEMO

      - name: Run Intelligence Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          rm -rf Intelligence-Module/root/ci-latest
          python Intelligence-Module/Orchestrator.py \
            "$GITHUB_WORKSPACE/ci-target/CICD_DEMO" \
            --source-root "$GITHUB_WORKSPACE/ci-target/CICD_DEMO" \
            --output-dir "root/ci-latest"

      - name: Upload Pipeline Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-results-${{ github.run_id }}
          path: Intelligence-Module/root/ci-latest
          if-no-files-found: error
